name: Build APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build Debug APK
      run: |
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        sdkmanager "build-tools;33.0.0" "platforms;android-33"
        wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip
        unzip -q gradle-7.5-bin.zip
        gradle-7.5/bin/gradle assembleDebug --no-daemon
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lianliankan-debug
        path: app/build/outputs/apk/debug/*.apk
    
    - name: Create Release
      if: github.event_name == 'push'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RUN_NUM: ${{ github.run_number }}
      run: |
        APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
        TAG="v1.${RUN_NUM}"
        gh release create "$TAG" "$APK" \
          --title "Lianliankan $TAG" \
          --repo "${{ github.repository }}"
