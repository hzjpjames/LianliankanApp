name: Build APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept licenses and install build tools
      run: |
        echo "y" | sdkmanager --licenses
        sdkmanager "build-tools;28.0.3" "platforms;android-28"
    
    - name: Build Debug APK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        
        # Download Gradle
        wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip
        unzip -q gradle-7.5-bin.zip
        
        # Build
        gradle-7.5/bin/gradle assembleDebug --no-daemon
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lianliankan-debug
        path: app/build/outputs/apk/debug/*.apk
    
    - name: Create Release with APK
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push'
      with:
        tag_name: v1.${{ github.run_number }}
        name: Lianliankan v1.${{ github.run_number }}
        files: app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}